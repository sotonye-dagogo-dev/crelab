<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Page Design — CreLab</title>
  <style>
    :root {
      --color-bg: #0A0A0A;
      --color-surface: #141414;
      --color-surface-raised: #1C1C1C;
      --color-border: #2A2A2A;
      --color-border-mid: #3D3D3D;
      --color-accent: #E8FF47;
      --color-accent-dim: #C8DF3C;
      --color-accent-muted: #1E2200;
      --color-text-primary: #F2F2F2;
      --color-text-secondary: #9A9A9A;
      --color-text-tertiary: #5C5C5C;
      --color-text-inverse: #0A0A0A;
      --font-display: 'Syne', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    .light {
      --color-bg: #FAFAF9;
      --color-surface: #FFFFFF;
      --color-surface-raised: #F2F2F0;
      --color-border: #E4E4E0;
      --color-border-mid: #D4D4D0;
      --color-accent: #A3B800;
      --color-accent-dim: #8FA000;
      --color-accent-muted: #F0F4D0;
      --color-text-primary: #161615;
      --color-text-secondary: #6B6B68;
      --color-text-tertiary: #9C9C98;
      --color-text-inverse: #FAFAF9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      display: flex; gap: 4px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px; padding: 4px;
    }
    .theme-toggle button {
      padding: 6px 12px; border-radius: 6px;
      border: none; cursor: pointer; font-size: 0.75rem; font-weight: 600;
      background: transparent; color: var(--color-text-tertiary);
      transition: all 0.15s;
    }
    .theme-toggle button.active {
      background: var(--color-accent); color: var(--color-text-inverse);
    }

    .page-wrap {
      max-width: 1200px; margin: 0 auto; padding: 80px 24px;
    }

    /* ── Header ── */
    .team-header {
      text-align: center; max-width: 680px; margin: 0 auto 64px;
    }
    .team-header h1 {
      font-family: var(--font-display); font-weight: 800;
      font-size: 2.5rem; letter-spacing: -0.02em; line-height: 1.2;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) {
      .team-header h1 { font-size: 1.875rem; }
    }
    .team-header p {
      color: var(--color-text-secondary);
      font-size: 1.125rem; line-height: 1.7;
    }

    /* ── Grid ── */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px; margin-bottom: 64px;
    }

    .team-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px; padding: 24px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 12px;
      transition: border-color 0.25s var(--ease-out), transform 0.25s var(--ease-out);
    }
    .team-card:hover {
      border-color: var(--color-border-mid);
      transform: translateY(-2px);
    }

    .team-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--color-surface-raised);
      border: 2px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.25rem; color: var(--color-text-tertiary);
      overflow: hidden; flex-shrink: 0;
    }
    .team-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .team-name {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.125rem; line-height: 1.3;
    }
    .team-role {
      font-size: 0.8125rem; color: var(--color-accent); font-weight: 500;
    }
    .team-bio {
      font-size: 0.8125rem; color: var(--color-text-secondary);
      line-height: 1.6;
    }

    .team-socials {
      display: flex; gap: 8px; margin-top: auto;
    }
    .team-social-link {
      width: 32px; height: 32px; border-radius: 6px;
      border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6875rem; color: var(--color-text-tertiary);
      text-decoration: none;
      transition: border-color 0.15s var(--ease-out), color 0.15s var(--ease-out);
    }
    .team-social-link:hover {
      border-color: var(--color-accent); color: var(--color-accent);
    }

    /* ── CTA banner ── */
    .team-cta {
      text-align: center; padding: 32px 0;
      border-top: 1px solid var(--color-border);
    }
    .team-cta h2 {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.5rem; margin-bottom: 8px;
    }
    .team-cta p {
      color: var(--color-text-secondary); margin-bottom: 24px;
    }
    .team-cta .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 40px; padding: 0 16px; border-radius: 8px;
      background: var(--color-accent); color: var(--color-text-inverse);
      font-family: var(--font-body); font-weight: 600; font-size: 0.875rem;
      border: none; cursor: pointer; text-decoration: none;
      transition: background 0.15s var(--ease-out);
    }
    .team-cta .btn:hover { background: var(--color-accent-dim); }
  </style>
</head>
<body>
  <div class="theme-toggle" id="themeToggle">
    <button data-theme="system" class="active">System</button>
    <button data-theme="dark">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <div class="page-wrap">
    <div class="team-header">
      <h1>Meet the Team</h1>
      <p>We are builders, creators, and problem-solvers on a mission to transform how African creatives connect with opportunity.</p>
    </div>

    <div class="team-grid" id="teamGrid"></div>

    <div class="team-cta">
      <h2>Want to be part of the team?</h2>
      <p>We are always looking for talented people who share our vision.</p>
      <a href="#" class="btn">View Open Positions</a>
    </div>
  </div>

  <script>
    const teamMembers = [
      { name: "Sotonye Dagogo", role: "Founder & Product Lead", bio: "Building the future of creative hiring in Africa. Product, design, and strategy.", avatar: null, socials: [{ platform: "Twitter", url: "#" }, { platform: "LinkedIn", url: "#" }] },
      { name: "Chioma Okafor", role: "Lead Engineer", bio: "Full-stack engineer passionate about developer experience and African tech ecosystems.", avatar: null, socials: [{ platform: "GitHub", url: "#" }, { platform: "LinkedIn", url: "#" }] },
      { name: "Emeka Nwosu", role: "Design Lead", bio: "Crafting cinematic interfaces that feel as good as they look.", avatar: null, socials: [{ platform: "Dribbble", url: "#" }, { platform: "X", url: "#" }] },
      { name: "Amina Bello", role: "Operations", bio: "Ensuring creators and clients have a seamless experience from first click to final delivery.", avatar: null, socials: [{ platform: "LinkedIn", url: "#" }] },
      { name: "Tunde Balogun", role: "Community Lead", bio: "Building the community that powers Nigeria's creative economy.", avatar: null, socials: [{ platform: "Twitter", url: "#" }, { platform: "LinkedIn", url: "#" }] },
      { name: "Zainab Ibrahim", role: "Growth & Marketing", bio: "Driving adoption and telling the CreLab story across Africa.", avatar: null, socials: [{ platform: "LinkedIn", url: "#" }] },
    ];

    const grid = document.getElementById('teamGrid');

    teamMembers.forEach(m => {
      const initials = m.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      const card = document.createElement('div');
      card.className = 'team-card';
      card.innerHTML = `
        <div class="team-avatar">${initials}</div>
        <div>
          <div class="team-name">${m.name}</div>
          <div class="team-role">${m.role}</div>
        </div>
        <div class="team-bio">${m.bio}</div>
        <div class="team-socials">
          ${m.socials.map(s => `<a href="${s.url}" class="team-social-link" aria-label="${s.platform}">${s.platform === 'X' ? 'X' : s.platform === 'LinkedIn' ? 'in' : s.platform === 'GitHub' ? 'GH' : s.platform === 'Dribbble' ? 'Dr' : s.platform.slice(0, 2)}</a>`).join('')}
        </div>
      `;
      grid.appendChild(card);
    });

    // Theme toggle
    document.querySelectorAll('#themeToggle [data-theme]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#themeToggle [data-theme]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const theme = btn.dataset.theme;
        if (theme === 'dark') {
          document.body.classList.remove('light');
        } else if (theme === 'light') {
          document.body.classList.add('light');
        } else {
          const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          document.body.classList.toggle('light', prefersLight);
        }
      });
    });
  </script>
</body>
</html>
